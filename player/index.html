<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>아바타 비서</title>
<style>
  :root{ --bg:#0b0b0f; --panel:#14141c; --panel2:#181822; --line:#26262f; --txt:#ececf2; --dim:#8f8fa6; --accent:#64748b; --ok:#34d399; --warn:#fbbf24; --u:#64748b; --field:#0e0e15; --hover:#20202b; }
  body{ transition:background .25s, color .25s; }
  *{ box-sizing:border-box; } html,body{ height:100%; }
  body{ margin:0; font-family:system-ui,'Segoe UI',sans-serif; background:var(--bg); color:var(--txt); display:flex; gap:16px; padding:16px; height:100vh; overflow:hidden; }

  /* ── 영상 창 ── */
  .call{ flex:0 0 auto; width:var(--callw,420px); height:100%; border-radius:20px; overflow:hidden; background:var(--panel); position:relative; display:flex; flex-direction:column; border:1px solid var(--line); box-shadow:0 14px 44px rgba(0,0,0,.5); min-width:200px; }
  .divider{ flex:0 0 8px; align-self:stretch; cursor:col-resize; border-radius:8px; }
  .divider:hover,.divider.drag{ background:#2b2b39; }
  .hd .mode{ cursor:pointer; font-size:14px; opacity:.85; margin-left:6px; }
  /* 분리 모드: 영상창이 떠서 이동/리사이즈/스냅 */
  /* 분리 모드: 배경 투명 → Tauri 투명창에서 영상·채팅만 바탕화면 위에 떠 보임(모니터 상주) */
  body.sep{ position:relative; background:transparent !important; }
  body.sep .divider{ display:none; }
  body.sep .call{ position:fixed; z-index:60; top:24px; right:24px; left:auto; width:300px; height:auto; aspect-ratio:9/16; resize:both; overflow:hidden; box-shadow:0 24px 70px #000d; transition:top .12s,left .12s,right .12s; }
  body.sep .call .hd{ cursor:move; }
  /* 분리 모드: 채팅창은 떠있는 반투명 패널 → 마우스 올리면 불투명·활성 (데스크탑 오버레이) */
  body.sep .chat{ position:fixed; right:24px; bottom:24px; z-index:55; width:min(380px,44vw);
    height:min(56vh,520px); border-radius:18px; box-shadow:0 24px 70px #000c;
    opacity:.14; transition:opacity .22s ease; }
  body.sep .chat:hover{ opacity:1; }
  /* 대화 숨김 토글 (영통 화면에서 자막만 남기고 채팅 오버레이 끔) */
  body.nochat .chat{ display:none; }

  /* ── 분리 창 모드(?pane=video|chat): 각 패널이 별도 Tauri 창을 꽉 채움 ──
     프레임리스·투명 창 위에 둥근 패널 하나만 떠 보임(모니터 상주, 자유 배치). */
  body.pane{ padding:0; gap:0; background:transparent !important; overflow:hidden; }
  body.pane .divider{ display:none; }
  body.pane-video .chat{ display:none; }
  body.pane-video .call{ flex:1 1 auto; width:100vw; height:100vh; border-radius:16px; }
  body.pane-chat .call{ display:none; }
  body.pane-chat .chat{ flex:1 1 auto; width:100vw; height:100vh; border-radius:16px; }
  /* 드래그 영역: 헤더·영상 무대를 잡고 창 이동(JS startDragging). 버튼/입력은 자체 클릭 유지. */
  body.pane .call .hd, body.pane .stage, body.pane .chat .hd{ cursor:grab; }
  body.pane .call .hd:active, body.pane .stage:active, body.pane .chat .hd:active{ cursor:grabbing; }
  body.pane .hd .mode, body.pane .hd .vt{ cursor:pointer; }
  /* 영상 창 보이기/숨기기 버튼: 분리 채팅 창에서만 노출(합본/브라우저엔 무의미) */
  .vidwin{ display:none; }
  body.pane-chat .vidwin{ display:inline-block; }
  /* 프레임리스 창 리사이즈 그립(Tauri startResizeDragging). 투명·얇게, pane+Tauri일 때만 생성. */
  .rgrip{ position:fixed; z-index:200; }
  .rgrip.n{ top:0; left:10px; right:10px; height:6px; cursor:ns-resize; }
  .rgrip.s{ bottom:0; left:10px; right:10px; height:6px; cursor:ns-resize; }
  .rgrip.e{ top:10px; bottom:10px; right:0; width:6px; cursor:ew-resize; }
  .rgrip.w{ top:10px; bottom:10px; left:0; width:6px; cursor:ew-resize; }
  .rgrip.ne{ top:0; right:0; width:13px; height:13px; cursor:nesw-resize; }
  .rgrip.nw{ top:0; left:0; width:13px; height:13px; cursor:nwse-resize; }
  .rgrip.se{ bottom:0; right:0; width:13px; height:13px; cursor:nwse-resize; }
  .rgrip.sw{ bottom:0; left:0; width:13px; height:13px; cursor:nesw-resize; }
  .call .hd{ flex:0 0 auto; z-index:3; display:flex; align-items:center; gap:8px; padding:11px 14px; background:var(--panel); border-bottom:1px solid var(--line); font-size:13px; }
  /* 영상 무대: 헤더 아래 남는 영역만 채움(헤더 침범 방지). 방 톤 그라데이션이 여백을 받침. */
  .stage{ position:relative; flex:1 1 auto; min-height:0; overflow:hidden;
    background:linear-gradient(180deg, color-mix(in srgb, var(--accent) 26%, var(--bg)) 0%, var(--bg) 55%, color-mix(in srgb, #000 42%, var(--bg)) 100%); }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--ok); box-shadow:0 0 8px var(--ok); }
  .hd .nm{ font-weight:600; } .hd .st{ margin-left:auto; font-size:11px; color:var(--dim); }
  .call video,.call img{ width:100%; height:100%; object-fit:cover; object-position:center 30%; display:block; }
  .call .lyr{ position:absolute; inset:0; transition:opacity .26s ease; will-change:opacity; }
  /* 줌 상한(capped-cover): 초세로 창에서 cover-crop이 얼굴만 꽉 채우는 것 방지.
     JS(applyZoomCap)가 영상 폭을 무대폭×CAP까지만 허용 — 세로 여백은 방 톤 그라데이션. */
  .badge{ position:absolute; top:46px; right:12px; z-index:3; background:#000c; border:1px solid var(--line); border-radius:9px; padding:5px 9px; font-size:11px; color:var(--dim); display:none; }
  .badge b{ color:var(--txt); }
  .cap{ position:absolute; left:0; right:0; bottom:0; z-index:3; padding:22px 16px 16px; background:linear-gradient(#0000,#000d); font-size:15px; line-height:1.45; min-height:20px; }
  .confirm{ position:absolute; inset:0; z-index:4; display:none; flex-direction:column; justify-content:flex-end; gap:8px; padding:18px; background:#0008; }
  .confirm button{ all:unset; text-align:center; background:var(--accent); color:#fff; border-radius:11px; padding:11px; cursor:pointer; font-size:14px; } .confirm button.no{ background:#2a2a38; }

  /* ── 대화 창 (텔레그램 스타일) ── */
  .chat{ flex:1; min-width:0; height:100%; display:flex; flex-direction:column; background:var(--panel); border:1px solid var(--line); border-radius:20px; overflow:hidden; }
  .chat .hd{ display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--line); }
  .chat .hd .av{ width:34px; height:34px; border-radius:50%; object-fit:cover; }
  .chat .hd .ti{ font-weight:600; font-size:14px; } .chat .hd .su{ font-size:11px; color:var(--dim); }
  .chat .hd .vt{ margin-left:auto; cursor:pointer; font-size:16px; opacity:.85; user-select:none; }
  .log{ flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; }
  .log::-webkit-scrollbar{ width:9px; } .log::-webkit-scrollbar-thumb{ background:#33333f; border-radius:9px; }
  .row{ display:flex; } .row.u{ justify-content:flex-end; }
  .bub{ max-width:74%; padding:9px 13px; border-radius:16px; font-size:14px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
  .row.a .bub{ background:var(--panel2); border:1px solid var(--line); border-bottom-left-radius:5px; }
  .row.u .bub{ background:var(--u); color:#fff; border-bottom-right-radius:5px; }
  .row.cmd .bub{ background:#0d0d14; border:1px solid var(--accent); color:var(--accent); font-family:ui-monospace,Consolas,monospace; }
  .code{ max-width:88%; background:var(--field); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .code .bar{ display:flex; align-items:center; gap:8px; padding:6px 11px; font-size:11px; color:var(--dim); border-bottom:1px solid var(--line); }
  .code .bar button{ all:unset; margin-left:auto; cursor:pointer; color:var(--accent); font-size:11px; }
  .code pre{ margin:0; padding:11px; overflow-x:auto; font-family:ui-monospace,Consolas,monospace; font-size:12.5px; }
  .file{ display:flex; align-items:center; gap:11px; max-width:74%; background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:11px 13px; }
  .file .ic{ font-size:22px; } .file .fn{ font-size:13px; } .file a{ margin-left:auto; color:var(--accent); font-size:12px; text-decoration:none; border:1px solid var(--line); border-radius:9px; padding:5px 11px; }
  .empty{ margin:auto; color:var(--dim); font-size:13px; text-align:center; }
  .typing{ align-self:flex-start; color:var(--dim); font-size:12px; padding:2px 6px; }

  /* 입력바 */
  .inbar{ display:flex; align-items:center; gap:8px; padding:12px 14px; border-top:1px solid var(--line); }
  .iconbtn{ all:unset; cursor:pointer; width:38px; height:38px; border-radius:50%; display:grid; place-items:center; font-size:17px; color:var(--dim); }
  .iconbtn:hover{ background:var(--hover); color:var(--txt); }
  .inbar input.msg{ flex:1; background:var(--field); color:var(--txt); border:1px solid var(--line); border-radius:22px; padding:11px 16px; font-size:14px; outline:none; }
  .inbar input.msg:focus{ border-color:var(--accent); }
  .send{ all:unset; cursor:pointer; width:40px; height:40px; border-radius:50%; background:var(--accent); color:#fff; display:grid; place-items:center; font-size:16px; }
  .skillmenu{ position:absolute; bottom:64px; left:14px; z-index:6; background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:6px; display:none; min-width:220px; max-width:min(440px,82vw); max-height:min(52vh,360px); overflow-y:auto; box-shadow:0 10px 30px #000a; }
  .skillmenu .cdesc{ opacity:.5; font-family:system-ui,'Segoe UI',sans-serif; font-size:11px; }
  .skillmenu div{ padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer; font-family:ui-monospace,Consolas,monospace; }
  .skillmenu div:hover{ background:var(--hover); }
  .chatwrap{ position:relative; flex:1; display:flex; flex-direction:column; min-height:0; }

  /* ── 이스터에그: 퍼포먼스 플레이어 (/sam) ── */
  .perf{ position:fixed; inset:0; z-index:100; display:none; pointer-events:none; }
  .perf.show{ display:block; }
  @keyframes pfade{ from{ opacity:0; transform:scale(.98); } to{ opacity:1; transform:none; } }
  .perf .box{ pointer-events:auto; position:absolute; left:20px; bottom:20px; width:min(380px,46vw); max-height:74vh; display:flex; flex-direction:column; background:var(--panel); border:1px solid var(--accent); border-radius:18px; overflow:hidden; box-shadow:0 30px 90px #000e, 0 0 0 1px #8b5cf633; }
  .perf .top{ display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--line); background:linear-gradient(90deg,#8b5cf622,#0000); cursor:move; user-select:none; }
  .perf .top .t{ font-weight:700; font-size:15px; letter-spacing:.3px; } .perf .top .sub{ font-size:11px; color:var(--dim); }
  .perf .top .x{ margin-left:auto; cursor:pointer; font-size:18px; color:var(--dim); } .perf .top .x:hover{ color:var(--txt); }
  .perf .body{ overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
  .perf .sec{ font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
  .grid{ display:flex; flex-wrap:wrap; gap:7px; }
  .chip{ cursor:pointer; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:7px 11px; font-size:12px; display:flex; flex-direction:column; gap:1px; min-width:78px; }
  .chip:hover{ border-color:var(--accent); background:var(--hover); } .chip.on{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .chip .n{ font-weight:600; } .chip .m{ font-size:10px; color:var(--dim); }
  .chip.loop .n{ color:var(--ok); } .chip.alive .n{ color:var(--warn); }
  .perf textarea{ width:100%; background:var(--field); color:var(--txt); border:1px solid var(--line); border-radius:11px; padding:10px 12px; font-size:13px; font-family:ui-monospace,Consolas,monospace; outline:none; resize:vertical; min-height:60px; }
  .perf textarea:focus{ border-color:var(--accent); }
  .perf .run{ all:unset; cursor:pointer; margin-top:8px; background:var(--accent); color:#fff; border-radius:10px; padding:9px 16px; font-size:13px; text-align:center; }
  .perf .hintrow{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .perf .hintrow span{ cursor:pointer; font-size:11px; color:var(--accent); border:1px solid var(--line); border-radius:8px; padding:3px 8px; font-family:ui-monospace,monospace; }

  /* ── 테마 선택기 ── */
  .thememenu{ position:fixed; z-index:130; display:none; width:280px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px; box-shadow:0 20px 60px #0009; overflow-y:auto; overscroll-behavior:contain; }
  .thememenu::-webkit-scrollbar{ width:9px; } .thememenu::-webkit-scrollbar-thumb{ background:#33333f; border-radius:9px; }
  .thememenu.show{ display:block; }
  .thememenu .lbl{ font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); margin:8px 2px 6px; }
  .thememenu .lbl:first-child{ margin-top:0; }
  .swgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .sw{ cursor:pointer; border-radius:10px; padding:7px 4px 6px; border:1px solid var(--line); display:flex; flex-direction:column; align-items:center; gap:5px; }
  .sw:hover{ border-color:var(--accent); }
  .sw.on{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .sw .disc{ width:26px; height:26px; border-radius:50%; position:relative; border:1px solid #0003; }
  .sw .disc i{ position:absolute; right:2px; bottom:2px; width:11px; height:11px; border-radius:50%; border:1.5px solid; }
  .sw .nm{ font-size:10px; color:var(--dim); white-space:nowrap; }
  .thememenu .langrow{ display:flex; gap:6px; }
  .thememenu .langbtn{ flex:1; text-align:center; cursor:pointer; font-size:12px; padding:7px; border:1px solid var(--line); border-radius:9px; color:var(--dim); }
  .thememenu .langbtn.on{ border-color:var(--accent); color:var(--txt); background:var(--hover); }
  .sysrow{ font-size:12px; padding:3px 2px; color:var(--txt); }
  .micsel{ width:100%; background:var(--field); color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:6px; font-size:12px; outline:none; }
</style>
</head>
<body>
  <!-- 영상 창 -->
  <div class="call">
    <div class="hd" data-tauri-drag-region><span class="dot" id="dot"></span><span class="nm" id="nameV">…</span><span class="st" id="stateLabel">온라인</span><span class="mode" id="chatBtn" onclick="toggleChat()" title="대화 표시/숨기기">💬</span><span class="mode" id="modeBtn" onclick="toggleMode()" data-i18n-title="sep" title="분리 / 합치기">⧉</span></div>
    <div class="stage" data-tauri-drag-region>
      <video id="vid" class="lyr" muted playsinline></video>
      <video id="vid2" class="lyr" muted playsinline style="opacity:0"></video>
      <div class="badge" id="badge"></div>
      <div class="cap" id="cap"></div>
      <div class="confirm" id="confirm"><div id="confirmText" style="margin-bottom:6px"></div>
        <button onclick="resolveConfirm(true)" data-i18n="confirm_yes">응, 진행해</button><button class="no" onclick="resolveConfirm(false)" data-i18n="confirm_no">아니, 취소</button></div>
    </div>
  </div>

  <div class="divider" id="divider" data-i18n-title="resize" title="드래그해서 크기조절"></div>

  <!-- 대화 창 -->
  <div class="chat">
    <div class="hd" data-tauri-drag-region><img class="av" id="hdav" src="../ref/source_final.png"><div><div class="ti" id="nameC">…</div><div class="su" id="liveLabel">연결 중…</div></div><span class="vt vidwin" id="vidToggle" title="영상 창 보이기/숨기기" onclick="toggleVideoWin()">🎬</span><span class="vt" id="themeBtn" data-i18n-title="theme" title="테마" onclick="toggleTheme(event)">🎨</span><span class="vt" id="vt" data-i18n-title="voice" title="음성 켜기/끄기" onclick="toggleVoice()">🔊</span></div>
    <div class="chatwrap">
      <div class="log" id="log"><div class="empty" data-i18n-html="empty">대화를 시작하세요.<br>파일 첨부 📎 · 스킬 <b>/</b> · Enter 전송</div></div>
      <div class="skillmenu" id="skillmenu"></div>
    </div>
    <div class="inbar">
      <input type="file" id="fileInput" hidden multiple>
      <button class="iconbtn" data-i18n-title="attach" title="파일 첨부" onclick="document.getElementById('fileInput').click()">📎</button>
      <button class="iconbtn" data-i18n-title="skills" title="스킬 (/)" onclick="toggleSkills()">⚡</button>
      <input class="msg" id="chatInput" data-i18n-ph="input_ph" placeholder="메시지 입력…  ( / 스킬 )" autocomplete="off">
      <button class="iconbtn" id="micBtn" data-i18n-title="mic" title="음성 입력" onclick="toggleMic()">🎙</button>
      <button class="send" data-i18n-title="send" title="전송" onclick="sendChat()">➤</button>
    </div>
  </div>

  <!-- 테마 선택기 -->
  <div class="thememenu" id="thememenu"></div>

  <!-- 이스터에그: 퍼포먼스 플레이어 (/sam) -->
  <div class="perf" id="perf">
    <div class="box">
      <div class="top"><span class="t" data-i18n="perf_title">🎬 퍼포먼스 플레이어</span><span class="sub" data-i18n="perf_sub">개발자 모드 · /sam</span><span class="x" onclick="closePerf()">✕</span></div>
      <div class="body">
        <div>
          <div class="sec"><span data-i18n="sec_seg">표정 · 모션 세그먼트</span> <span id="segCount" style="color:var(--dim)"></span></div>
          <div class="grid" id="segGrid"></div>
        </div>
        <div>
          <div class="sec" data-i18n="sec_parse">감정비트 파서 테스트 (실제 파이프라인)</div>
          <textarea id="perfIn" data-i18n-ph="perf_ph" placeholder="[happy] 안녕! [pout] 흥, 삐졌어 [excited] 근데 이거 봐봐"></textarea>
          <div class="hintrow" id="perfHints"></div>
          <button class="run" onclick="runPerf()" data-i18n="run">▶ 재생 (파서 → 퍼포먼스)</button>
        </div>
      </div>
    </div>
  </div>

<script src="vad/ort.js"></script>
<script src="vad/bundle.min.js"></script>
<script>
const BRIDGE='http://127.0.0.1:8900', TTS='http://127.0.0.1:8899', STT='http://127.0.0.1:8898';
// ── 분리 창 역할: ?pane=video (아바타·TTS·자막) / ?pane=chat (로그·입력·마이크) / 없음=합본 ──
// 두 창은 같은 브리지 SSE를 구독하지만, TTS·영상재생은 video 창만 수행(이중 오디오 방지).
const PANE=new URLSearchParams(location.search).get('pane');
const DO_VIDEO=(PANE!=='chat');   // 영상+TTS+자막 재생 주체
const DO_CHAT =(PANE!=='video');  // 채팅 로그·데이터카드·입력 주체
// 분리 창(Tauri): 헤더/영상 잡고 이동(startDragging) + 8방향 리사이즈 그립(startResizeDragging).
// data-tauri-drag-region은 클릭 대상이 정확히 그 요소일 때만 동작 → 자식/영상 클릭 시 실패.
// 그래서 JS로 직접 mousedown→startDragging (버튼·입력·그립만 제외)해 어디든 잡히게 함.

  try{
    const all=await T.window.getAllWindows();
    const vw=all.find(w=>w.label==='video'); if(!vw) return;

function initPaneWindow(){
  if(!PANE) return;
  const T=window.__TAURI__;
  if(!T||!T.window){   // 진단: 원격 오리진에 Tauri API 미주입이면 구석에 표식(정상이면 안 뜸)
    const d=document.createElement('div'); d.textContent='⚠ tauri-api x';
    d.style.cssText='position:fixed;left:4px;bottom:4px;z-index:999;font-size:9px;color:#e0385f;opacity:.7;pointer-events:none';
    document.body.appendChild(d); return;
  }
  const win=T.window.getCurrentWindow ? T.window.getCurrentWindow() : (T.window.getCurrent&&T.window.getCurrent());
  if(!win) return;
  const NO_DRAG='button,input,textarea,select,a,.mode,.vt,.sw,.langbtn,.rgrip,.ib,#send,#mic,[onclick]';
  document.querySelectorAll('.call .hd, .stage, .chat .hd').forEach(el=>{
    el.addEventListener('mousedown',ev=>{
      if(ev.button!==0 || ev.target.closest(NO_DRAG)) return;
      ev.preventDefault(); try{ win.startDragging(); }catch(e){}
    });
  });
  if(win.startResizeDragging){
    const DIRS={n:'North',s:'South',e:'East',w:'West',ne:'NorthEast',nw:'NorthWest',se:'SouthEast',sw:'SouthWest'};
    for(const d in DIRS){ const g=document.createElement('div'); g.className='rgrip '+d;
      g.addEventListener('mousedown',ev=>{ if(ev.button!==0)return; ev.preventDefault(); try{ win.startResizeDragging(DIRS[d]); }catch(e){} });
      document.body.appendChild(g); }
  }
}

// ── 이중버퍼 크로스페이드: src 교체 시 검은 프레임 깜빡임 제거 ──
let front=$('vid'), back=$('vid2'), settleT={}; const FADE=260;
function swapLayers(){ const t=front; front=back; back=t; }
let _crossQ=Promise.resolve();     // crossTo 직렬화 — 동시 레이어 스왑 레이스(감정 씹힘) 방지
function crossTo(n, loop, fade, startAt){
  const run=()=>new Promise(res=>{
    const fd=(fade==null?FADE:fade); let done=false;
    const go=()=>{ if(done)return; done=true; back.removeEventListener('playing',go);
      back.style.transitionDuration=(fd/1000)+'s'; front.style.transitionDuration=(fd/1000)+'s';
      back.style.opacity=1; front.style.opacity=0; const prev=front; swapLayers();
      setTimeout(()=>{ try{ prev.pause(); }catch(e){} }, fd+80); res(); };
    back.loop=!!loop; back.onended=null; back.dataset.cur=n;
    if(startAt){ const sk=()=>{ try{ back.currentTime=startAt; }catch(e){} back.removeEventListener('loadedmetadata',sk); };
      back.addEventListener('loadedmetadata',sk); }   // 정면(settle) 프레임에서 시작 → 이음새 정렬
    back.addEventListener('playing',go);
    try{ back.src=segUrl(n); const p=back.play(); if(p&&p.catch)p.catch(()=>setTimeout(go,50)); }catch(e){ setTimeout(go,50); }
    setTimeout(go, 1100); // 안전장치: 'playing' 미발생 시(캐시 등) 강제 전환
  });
  const p=_crossQ.then(run, run); _crossQ=p.catch(()=>{}); return p;   // 이전 전환 끝난 뒤 실행
}
function loopSeg(n){ if(!has(n))return; if(front.dataset.cur===n&&front.loop&&!front.paused)return;
  crossTo(n,true).then(()=>{ front.playbackRate=(MOOD&&MOOD.rate)||1; }); }
function playOnceAsync(n, fade, capMs){ return new Promise(res=>{ if(!has(n)){res();return;}
  crossTo(n,false,fade).then(()=>{ const v=front; v.playbackRate=1; let d=0;
    const fin=()=>{ if(d)return; d=1; v.onended=null; res(); }; v.onended=fin; setTimeout(fin,capMs||4000); }); }); }

// ── settle 게이트: idle에서 고개가 감정소스 베이스(f111 정면) 포즈에 도달하는 순간까지 대기 ──
// 그 시점에 표정을 드러내면 포즈가 일치해 스냅 없이 "정위치에서 감정이 드러나는" 연출이 됨.
function waitForSettle(tok){ return new Promise(res=>{
  const v=front, st=settleT[v.dataset.cur], d=v.duration||0;
  if(!st||!st.length||!d){ res(false); return; }
  const ct=v.currentTime; let wait=1e9; for(const s of st){ let dt=s-ct; if(dt<0)dt+=d; if(dt<wait)wait=dt; }
  const CAP=2.0, matched=wait<=CAP, ms=(matched?wait:CAP)*1000;
  let done=false; const fin=(m)=>{ if(done)return; done=true; clearInterval(chk); res(m); };
  const timer=setTimeout(()=>fin(matched), ms+20);
  const chk=setInterval(()=>{ if(tok!==playToken){ clearTimeout(timer); fin(false); } }, 50);
  setTimeout(()=>clearInterval(chk), ms+80);
}); }
// ── 표시 프레이밍: 크롭 범위를 9:16 ~ 16:9로 클램프 ──
// 무대AR이 [9:16, 16:9] 안이면 cover로 꽉 채움(좌우 크롭, 넓힐수록 원본 더 노출).
// 9:16보다 세로로 좁아지면 → 9:16에서 고정(더 안 잘림), 상하 여백은 방 톤 그라데이션.
// 16:9보다 가로로 넓어지면 → 원본 풀프레임에서 고정, 좌우 여백은 그라데이션.
const MIN_AR=9/16, SRC_AR=16/9;
function applyZoomCap(){
  const st=document.querySelector('.stage'); if(!st) return;
  const W=st.clientWidth, H=st.clientHeight; if(!W||!H) return;
  const ar=W/H;
  for(const v of [document.getElementById('vid'),document.getElementById('vid2')]){
    if(!v) continue;
    if(ar>=MIN_AR && ar<=SRC_AR){          // 범위 내: 순수 cover(무대 꽉 참)
      v.style.width=''; v.style.height=''; v.style.left=''; v.style.top=''; v.style.right=''; v.style.bottom='';
    }else if(ar<MIN_AR){                    // 너무 세로로 좁음 → 9:16 고정, 상하 레터박스
      const w=W, h=W/MIN_AR;
      v.style.width=w+'px'; v.style.height=h+'px'; v.style.left='0'; v.style.top=((H-h)/2)+'px'; v.style.right='auto'; v.style.bottom='auto';
    }else{                                  // 너무 가로로 넓음 → 원본 풀프레임 고정, 좌우 레터박스
      const h=H, w=H*SRC_AR;
      v.style.width=w+'px'; v.style.height=h+'px'; v.style.top='0'; v.style.left=((W-w)/2)+'px'; v.style.right='auto'; v.style.bottom='auto';
    }
  }
}
window.addEventListener('resize',applyZoomCap);
(function(){ const c=document.querySelector('.stage'); if(c) new ResizeObserver(applyZoomCap).observe(c); })();

// ── TTS ──
let ttsPlaying=false;   // 하프듀플렉스: 재생 중엔 마이크 청취 정지 (에코 루프 방지)
// 필러(시간벌기) 런타임 상태 — 활성 엔진 합성지연 추정 + 준비된 필러 목록
let TTS_LAT={base:1,per_char:0.1}, FILLER={ready:[],tiers:{},emotions:{},enabled:true};
async function refreshTtsRuntime(){
  try{ const p=await (await fetch(TTS+'/providers',{cache:'no-store'})).json();
    const act=(p.providers||[]).find(x=>x.provider===p.active);
    if(act&&act.meta&&act.meta.latency) TTS_LAT=act.meta.latency;
  }catch(e){}
  try{ const f=await (await fetch(TTS+'/fillers',{cache:'no-store'})).json();
    FILLER={ready:f.ready||[], tiers:f.tiers||{}, emotions:f.emotions||{}, enabled:f.enabled!==false};
  }catch(e){}
}
// 프리페치: 감정 세그먼트가 재생되는 동안 합성을 미리 시작 → 체감 지연 절감
function ttsFetch(text){ if(!voiceOn||!text) return null;
  const v=(PRESET&&PRESET.voice)||{};
  return fetch(TTS+'/tts',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text,speaker:v.speaker,language:v.language})})
    .then(r=>{ if(!r.ok) throw 0; return r.blob(); }).then(b=>URL.createObjectURL(b))
    .catch(()=>null); }
// A안: 문장 단위 청킹. RTF~2.8x가 하드 플로어라 '문장 내' 쪼개기는 오히려 갭을 만든다
// (짧은 오프너 뒤 19s 침묵 실측). 문장 단위면 각 문장은 매끈하게 재생되고, 여러 문장
// 답변은 1번 문장이 재생되는 동안 2번이 뒤에서 합성돼 전체 대기가 줄어든다.
// 3-플레인 분리로 대사 자체가 짧아(코드·로그는 데이터 평면행) 대부분 1~2문장이다.
function _chunkText(text){
  let sents=text.split(/(?<=[.!?…~])\s+/).map(s=>s.trim()).filter(Boolean);
  if(sents.length<=1) return [text];
  const out=[];                                    // 아주 짧은 문장(<6자)은 이웃과 합쳐 프로소디 보호
  for(const s of sents){ if(out.length&&(s.length<6||out[out.length-1].length<6)) out[out.length-1]+=' '+s; else out.push(s); }
  return out.slice(0,10);
}
function ttsFetchSeq(text){ if(!voiceOn||!text) return null;
  const parts=_chunkText(text);
  if(parts.length<=1) return [{text,urlP:ttsFetch(text)}];
  return parts.map(t=>({text:t,urlP:ttsFetch(t)}));   // 전부 즉시 발사 → 서버 FIFO가 순서대로 합성
}
async function playTTSSeq(parts,fullText){
  if(!parts){ await playTTS(null,fullText); return; }
  for(const p of parts){ await playTTS(p.urlP,p.text); }
}
// 오디오 1개를 재생하고 끝나면 resolve (워치독으로 고착 방지)
function _clip(src, maxMs){ return new Promise(res=>{
  const a=new Audio(src); let d=0;
  const done=()=>{ if(d)return; d=1; clearTimeout(w); res(); };
  const w=setTimeout(done, maxMs||8000); a.onended=done; a.onerror=done; a.play().catch(done);
}); }
// 필러 루프: 실오디오 준비(stopRef.stop) 전까지 tier에 맞는 필러를 순차 재생.
// est가 클수록 긴 tier부터, 서로 다른 필러를 돌려 반복감을 줄임. 안전 상한 6개.
async function _fillerLoop(est, stopRef){
  if(!FILLER.ready.length) return;
  const order = est>10?['long','med','short']:est>4?['med','short']:['short'];
  let k=0;
  while(!stopRef.stop && k<6){
    const tier=order[Math.min(k,order.length-1)];
    let ids=(FILLER.tiers[tier]||[]).filter(i=>FILLER.ready.includes(i));
    if(!ids.length) ids=FILLER.ready;
    const id=ids[k%ids.length];
    if(stopRef.stop) break;
    await _clip(TTS+'/filler?id='+id+'&n='+k, 6000);
    k++;
  }
}
function playTTS(urlP,text,fillerId){ return new Promise(async res=>{
  const fallback=()=>setTimeout(res, Math.min(3200,600+(text||'').length*55));
  // 숨은 탭은 발화 금지 (여러 탭이 같은 SSE를 받아 각자 재생 → 중복 발화 방지)
  if(!voiceOn||!text||document.hidden){ document.hidden?setTimeout(res,150):fallback(); return; }
  // ── 필러 백본: 합성 ETA가 임계 이상이고 필러가 준비돼 있으면, 실오디오 대기 중 필러 재생 ──
  const est=(TTS_LAT.base||1)+(TTS_LAT.per_char||0)*text.length;
  const stopRef={stop:false}; let fillerP=null;
  const armed = FILLER.enabled && FILLER.ready.length && (fillerId || est>=1.3);
  if(armed){
    ttsPlaying=true;
    if(fillerId && FILLER.ready.includes(fillerId))       // LLM이 고른 필러 우선(즉시 1개)
      fillerP=_clip(TTS+'/filler?id='+fillerId+'&n=x',6000).then(()=>{ if(!stopRef.stop) return _fillerLoop(est,stopRef); });
    else
      fillerP=_fillerLoop(est,stopRef);
  }
  let url=null; try{ url=await urlP; }catch(e){}
  stopRef.stop=true;                                   // 실오디오 준비 → 현재 필러 클립 끝나면 종료
  if(fillerP){ try{ await fillerP; }catch(e){} }
  if(!url){ ttsPlaying=false; fallback(); return; }
  const a=new Audio(url); ttsPlaying=true; let d=0;
  const done=()=>{ if(d)return; d=1; ttsPlaying=false; clearTimeout(wd); URL.revokeObjectURL(url); res(); };
  const wd=setTimeout(done, 9000+text.length*150);   // watchdog: onended 미발화/차단 시 고착 방지
  a.onended=done; a.onerror=done;
  a.play().catch(done);                              // autoplay 차단이어도 플래그 안 고착
}); }
function toggleVoice(){ voiceOn=!voiceOn; $('vt').textContent=voiceOn?'🔊':'🔇'; }
function toggleChat(){ const off=document.body.classList.toggle('nochat'); const b=$('chatBtn'); if(b){ b.textContent=off?'🗨️':'💬'; b.style.opacity=off?'.45':''; } try{ localStorage.setItem('avatarNoChat', off?'1':''); }catch(e){} }

// ── 퍼포먼스 재생: 행동/대화/데이터 3-플레인, 감정 비트 순차 ──
let confirmCb=null, playToken=0;
async function play(p){
  const tok=++playToken;
  if(p.mood) setMood(p.mood);
  if(!DO_VIDEO){   // 분리 채팅 창: 로그·데이터만(영상/TTS/확인은 영상 창이 담당) → 이중 오디오 없음
    renderData(p.data);
    const cbeats=(p.dialogue?.beats&&p.dialogue.beats.length)?p.dialogue.beats:[{text:p.dialogue?.text||''}];
    for(const b of cbeats){ if(b.text) appendAgent(b.text); }
    return;
  }
  // 사용자 말에 대한 즉시 반응(칭찬/질책): settle 대기 없이 바로 움찔/반색 → idle 복귀
  if(p.context&&p.context.trigger_type==='user_reaction'){
    const b=(p.dialogue&&p.dialogue.beats&&p.dialogue.beats[0])||{emotion:'neutral'};
    const seg=segFor(b.emotion);
    setBadge(b.emotion,b.intensity);
    if(seg){ await playOnceAsync(seg.name,120); }
    if(tok===playToken) idleFront();
    return;
  }
  renderData(p.data);
  if(p.context?.requires_confirmation){ const text=p.dialogue?.text||''; $('cap').textContent=text; appendAgent(text);
    $('confirmText').textContent=text||t('confirm_q'); $('confirm').style.display='flex'; setState('speaking');
    loopSeg(has('concerned')?'concerned':idleBase());
    confirmCb=(y)=>{ $('confirm').style.display='none'; appendAgent(y?t('approved'):t('canceled')); idle(); }; return; }
  const beats=(p.dialogue?.beats&&p.dialogue.beats.length)?p.dialogue.beats
    :[{emotion:p.performance?.emotion||'neutral', text:p.dialogue?.text||'', intensity:p.performance?.intensity||0.85}];
  for(const b of beats){
    if(tok!==playToken)return;
    if(b.text)appendAgent(b.text);                        // 채팅 로그는 즉시
    const pre=ttsFetchSeq(b.text);                        // 문장별 합성을 세그먼트 재생과 병렬로
    const seg=segFor(b.emotion);
    // ── 필러 프렐류드: 첫 비트 + 합성 느릴 때만, 단발 골똘/한숨(루프X) → 이어서 답변 감정 ──
    if(b===beats[0] && voiceOn && !document.hidden && FILLER.enabled && FILLER.ready.length){
      const est0=(TTS_LAT.base||1)+(TTS_LAT.per_char||0)*(b.text||'').length;
      if(est0>=1.6){
        const fid=(FILLER.tiers.short||[]).filter(i=>FILLER.ready.includes(i))[0]||FILLER.ready[0];
        const fEmo=(fid&&FILLER.emotions&&FILLER.emotions[fid])||'pondering';
        const fSeg=segFor(fEmo)||SEGS.find(s=>s.name===fEmo);
        if(fSeg){ setState('speaking'); try{ _clip(TTS+'/filler?id='+fid+'&n=x',6000); }catch(e){} await playOnceAsync(fSeg.name,FADE); if(tok!==playToken)return; }
      }
    }
    let matched=false;
    // idle에서 반응 시작할 때만 정위치 대기 (talk 루프는 이미 정면이라 대기 불필요)
    if(seg && settleT[front.dataset.cur]){ matched=await waitForSettle(tok); if(tok!==playToken)return; }
    $('cap').textContent=b.text; setBadge(b.emotion,b.intensity); setState('speaking');
    if(seg) await playOnceAsync(seg.name, matched?120:FADE); // 정위치 일치 시 짧은 페이드로 즉시 드러냄
    if(tok!==playToken)return;
    loopSeg(talkBase()); await playTTSSeq(pre,b.text);
  }
  if(tok===playToken) idleFront();
}
function resolveConfirm(y){ if(confirmCb)confirmCb(y); }

// ── idle rest 스케줄러: 대기 중 가끔 눈 감고 쉼 (빤히 응시 방지) ──
let _idleSince=Date.now(), _nextRest=18000+Math.random()*14000, _resting=false;
function _restSeg(){
  // 무드 일치 rest 우선; 뉴트럴은 차분한 positive rest 차용 가능(네거티브는 무드 불일치 표정 금지)
  const rests=SEGS.filter(s=>s.kind==='mood_idle'&&s.style==='rest_eyes_closed');
  return rests.find(s=>s.mood===MOOD.base)
      || (MOOD.base==='neutral' ? rests.find(s=>s.mood==='positive') : null)
      || null;
}
setInterval(async ()=>{
  if(stateKey!=='online'||_resting){ if(_resting)_idleSince=Date.now(); return; }
  // 자가치유: idle이어야 하는데 비루프 영상이 끝나 얼어있으면 base idle로 복귀
  if(front && !front.loop && front.paused){ idle(); _idleSince=Date.now(); return; }
  if(Date.now()-_idleSince<_nextRest) return;
  const r=_restSeg(); if(!r){ _idleSince=Date.now(); return; }
  _resting=true;
  const tok=++playToken;
  const dur=Math.min(9000,(r.frames/(r.fps||24))*1000+400);
  await playOnceAsync(r.name, 400, dur);                 // 천천히 감았다가
  if(tok===playToken) idle();                            // 다시 base로
  _resting=false; _idleSince=Date.now(); _nextRest=18000+Math.random()*14000;
},2500);

// 필러 설정: 기본 문구로 입력칸 프리필 → 사용자 편집 → 현재 목소리로 합성(진행 폴링)

    try{ await fetch(TTS+'/fillers/enabled',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:curEn})}); }catch(e){}

  tog.appendChild(tb); box.appendChild(tog);
  const note=document.createElement('div'); note.className='lbl'; note.style.cssText='opacity:.7;margin:3px 0 6px';
  note.textContent=_K('합성 지연을 덮는 짧은 필러를 현재 목소리로 미리 만들어 둡니다. 문구는 수정 가능.',

    const total=Object.keys(ph).length;
    const poll=async()=>{ let r; try{ r=await (await fetch(TTS+'/fillers',{cache:'no-store'})).json(); }catch(e){ return setTimeout(poll,1500); }

    if(r.building) setTimeout(tick,2500);
  }; setTimeout(tick,2500); }
}
// 인앱 설치: /install 호출 → /install/status 폴링 → 완료 시 메뉴 갱신
async function installProvider(name, statusEl, btn){
  if(btn){ btn.style.pointerEvents='none'; btn.style.opacity='.6'; }
  const log=document.createElement('pre');
  log.style.cssText='margin-top:6px;max-height:150px;overflow:auto;background:var(--bg2,#111);border:1px solid var(--line);border-radius:7px;padding:6px;font-size:10px;white-space:pre-wrap;line-height:1.35';
  log.textContent=_K('설치 시작…','Starting install…'); statusEl.appendChild(log);
  try{ await fetch(TTS+'/install',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})}); }
  catch(e){ log.textContent=_K('설치 요청 실패(TTS 서버 확인)','install request failed'); return; }
  const poll=async()=>{
    let s; try{ s=await (await fetch(TTS+'/install/status',{cache:'no-store'})).json(); }catch(e){ return setTimeout(poll,1500); }
    log.textContent=(s.log||[]).join('\n'); log.scrollTop=log.scrollHeight;
    if(s.running){ setTimeout(poll,1500); return; }
    if(s.done){
      appendCmd(s.ok?_K('✅ '+name+' 설치 완료','✅ '+name+' installed')
                   :_K('❌ '+name+' 설치 실패(로그 확인)','❌ '+name+' install failed (see log)'));
      if(s.ok) setTimeout(buildTtsMenu,600);   // 상태 갱신(설치됨/준비됨)
    }
  };
  setTimeout(poll,1200);
}
async function buildCloneUI(d){
  let st={}; try{ st=await (await fetch(TTS+'/clone/status',{cache:'no-store'})).json(); }catch(e){}
  const box=document.createElement('div'); box.style.marginTop='8px';
  const hd=document.createElement('div'); hd.className='lbl';
  hd.textContent=_K('음성 클로닝 (Qwen)','Voice cloning (Qwen)')
    +(st.active?_K(' · 적용됨: '+(st.ref||'ref'),' · on: '+(st.ref||'ref')):'');
  box.appendChild(hd);
  const file=document.createElement('input'); file.type='file'; file.accept='audio/*'; file.className='micsel';
  box.appendChild(file);
  const txt=document.createElement('input'); txt.className='micsel'; txt.style.marginTop='6px';
  txt.placeholder=_K('레퍼런스 전사(선택, 정확도↑)','reference transcript (optional, better accuracy)');
  box.appendChild(txt);
  const row=document.createElement('div'); row.style.cssText='display:flex;gap:6px;margin-top:6px;align-items:center';
  const apply=document.createElement('div'); apply.className='langbtn'; apply.style.flex='1'; apply.textContent=_K('클론 적용','Apply clone');
  apply.onclick=async()=>{
    if(!file.files||!file.files[0]){ appendCmd(_K('🎤 레퍼런스 오디오를 선택하세요','🎤 pick a reference clip')); return; }
    apply.textContent=_K('처리 중…(모델 로드)','Processing…(loading model)');
    const fd=new FormData(); fd.append('audio',file.files[0]); if(txt.value.trim())fd.append('ref_text',txt.value.trim());
    try{ const r=await (await fetch(TTS+'/clone',{method:'POST',body:fd})).json();
      appendCmd(r.ok?_K('🎤 목소리 클론 적용됨','🎤 voice cloned'):_K('🎤 클론 실패: ','🎤 clone failed: ')+(r.error||''));
    }catch(e){ appendCmd(_K('🎤 클론 요청 실패(TTS 서버 확인)','🎤 clone request failed')); }
    buildTtsMenu();
  };
  row.appendChild(apply);
  if(st.active){ const clr=document.createElement('div'); clr.className='langbtn'; clr.textContent=_K('해제','Clear');
    clr.onclick=async()=>{ try{ await fetch(TTS+'/clone/clear',{method:'POST'}); appendCmd(_K('🎤 프리셋 음성으로 복귀','🎤 back to preset voice')); }catch(e){} buildTtsMenu(); };
    row.appendChild(clr); }
  box.appendChild(row);
  const note=document.createElement('div'); note.className='lbl'; note.style.opacity='.7'; note.style.marginTop='4px';
  note.textContent=_K('5~15초 깨끗한 음성 권장 · 적용 시 GPU 사용','5-15s clean speech recommended · uses GPU on apply');
  box.appendChild(note);
  d.appendChild(box);
}
async function setTtsProvider(name, settings){
  try{
    const body={name}; if(settings)body.settings=settings;
    const r=await (await fetch(TTS+'/provider',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
    appendCmd('🔊 '+_K('음성 엔진 → ','Voice engine → ')+name+(r.ready?'':_K(' (설정 필요)',' (needs setup)')));
  }catch(e){ appendCmd('🔊 '+_K('엔진 전환 실패','engine switch failed')); }
  refreshTtsRuntime();            // 새 엔진의 지연 추정 + 필러 준비상태 갱신
  buildTtsMenu();
}
try{ navigator.mediaDevices.addEventListener('devicechange',()=>buildMicMenu()); }catch(e){}
function _wav16(f32){ // Float32 @16k mono -> WAV(PCM16) Blob
  const n=f32.length, buf=new ArrayBuffer(44+n*2), v=new DataView(buf);
  const ws=(o,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4,36+n*2,true); ws(8,'WAVEfmt '); v.setUint32(16,16,true);
  v.setUint16(20,1,true); v.setUint16(22,1,true); v.setUint32(24,16000,true);
  v.setUint32(28,32000,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,'data'); v.setUint32(40,n*2,true);
  for(let i=0;i<n;i++){ const s=Math.max(-1,Math.min(1,f32[i])); v.setInt16(44+i*2, s<0?s*0x8000:s*0x7FFF, true); }
  return new Blob([buf],{type:'audio/wav'});
}
async function _onUtterance(f32){
  if(ttsPlaying||stateKey==='speaking') return;          // 아바타 발화 중 픽업 무시
  if(f32.length<16000*0.35) return;                       // 0.35초 미만 = 노이즈
  try{
    const r=await fetch(STT+'/stt?hint='+encodeURIComponent(curName||''),
      {method:'POST',headers:{'Content-Type':'audio/wav'},body:_wav16(f32)});
    const j=await r.json();
    const text=(j.text||'').trim();
    if(!text) return;
    appendUser(text); sendToBridge(text);                 // 타이핑과 동일 경로
  }catch(e){ console.warn('stt fail',e); }
}
async function toggleMic(){
  const btn=$('micBtn');
  if(micOn){ micOn=false; try{ _vad&&_vad.pause(); }catch(e){} btn.style.color=''; btn.style.filter=''; btn.textContent='🎙'; return; }
  try{
    if(!_vad){
      if(typeof vad==='undefined'||typeof ort==='undefined'){ appendAgent('⚠ VAD 라이브러리 로드 실패 (player/vad/ 확인)'); return; }
      ort.env.wasm.wasmPaths='vad/';
      // 스트림을 직접 확보 → 어떤 장치를 듣는지 확인 가능 + 에코캔슬 강제
      let stream=null, label='(기본 장치)';
      const base={echoCancellation:true,noiseSuppression:true,autoGainControl:true};
      const want=micDevId();
      try{
        stream=await navigator.mediaDevices.getUserMedia({audio: want?{...base,deviceId:{exact:want}}:base});
      }catch(e){
        if(want){ // 선택 장치가 사라짐(언플러그 등) → 기본 장치 폴백
          appendAgent('⚠ 선택한 마이크를 열 수 없어('+(e.name||e)+') — 기본 장치로 전환');
          try{ localStorage.removeItem('micDevice'); }catch(_){}
          try{ stream=await navigator.mediaDevices.getUserMedia({audio:base}); }
          catch(e2){ appendAgent('⚠ 마이크 권한/장치 오류: '+(e2.name||e2)); return; }
        } else { appendAgent('⚠ 마이크 권한/장치 오류: '+(e.name||e)); return; }
      }
      _micStream=stream;
      label=(stream.getAudioTracks()[0]||{}).label||label;
      const opts={
        workletURL:'vad/vad.worklet.bundle.min.js', modelURL:'vad/silero_vad.onnx',
        positiveSpeechThreshold:0.5, negativeSpeechThreshold:0.35,   // 완화 (BT 마이크 레벨 대응)
        minSpeechFrames:3, redemptionFrames:10, preSpeechPadFrames:3,
        onSpeechStart:()=>{ btn.style.filter='drop-shadow(0 0 8px var(--ok))'; },
        onVADMisfire:()=>{ btn.style.filter=''; },
        onSpeechEnd:(audio)=>{ btn.style.filter=''; _onUtterance(audio); },
        onFrameProcessed:(p)=>{ if(p&&typeof p.isSpeech==='number'){        // 실시간 레벨 글로우
          btn.style.textShadow=`0 0 ${Math.round(p.isSpeech*10)}px var(--accent)`; } },
      };
      try{ _vad=await vad.MicVAD.new({...opts, stream}); }
      catch(e1){ // stream 옵션 미지원 폴백: VAD가 자체 getUserMedia
        try{ stream.getTracks().forEach(t=>t.stop()); }catch(_){}
        _micStream=null;
        try{ _vad=await vad.MicVAD.new(opts); }
        catch(e2){ appendAgent('⚠ VAD 초기화 실패: '+(e2.message||e2)); return; }
      }
      appendCmd('🎙 듣는 중: '+label);   // 어떤 마이크가 잡혔는지 즉시 확인
    }
    _vad.start(); micOn=true; _vadPaused=false;
    btn.style.color='var(--accent)'; btn.textContent='🎙';
  }catch(e){ appendAgent('⚠ 마이크를 열 수 없어: '+(e.message||e)); }
}
// 하프듀플렉스 감시: 아바타 말하는 동안 VAD 정지, 끝나면 재개
setInterval(()=>{ if(!micOn||!_vad) return;
  const busy=ttsPlaying||stateKey==='speaking';
  if(busy&&!_vadPaused){ try{_vad.pause();}catch(e){} _vadPaused=true; $('micBtn').textContent='⏸'; }
  else if(!busy&&_vadPaused){ try{_vad.start();}catch(e){} _vadPaused=false; $('micBtn').textContent='🎙'; }
},250);

// ── 입력: 텍스트 / 슬래시 / 파일 ──
async function sendToBridge(text){ try{ await fetch(BRIDGE+'/hermes/in',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})}); }catch(e){ appendAgent(t('bridge_off')); } }
function sendChat(){ const inp=$('chatInput'); const t=inp.value.trim(); if(!t)return; inp.value=''; $('skillmenu').style.display='none';
  if(t.toLowerCase()==='/sam'){ openPerf(); return; }   // 이스터에그
  if(t.startsWith('/')) appendCmd(t); else appendUser(t); sendToBridge(t); }

// ── 이스터에그: 퍼포먼스 플레이어 ──
// 감정 미리보기 큐: 각 감정을 끝까지 재생 → 바로 다음(씹힘·끊김 없이 순차). 큐 비면 정면 idle 복귀.
let _emoQ=[], _emoDraining=false;
async function _drainEmo(){ _emoDraining=true;
  while(_emoQ.length){ const s=_emoQ.shift(); setBadge(s.emotion,s.intensity); setState('speaking');
    await playOnceAsync(s.name); }        // 끝날 때까지 대기 후 다음
  _emoDraining=false; idleFront(); }        // 큐 비면 정면(settle)에서 idle 복귀
function previewSeg(s,el){ document.querySelectorAll('.chip.on').forEach(c=>c.classList.remove('on')); el&&el.classList.add('on');
  if(s.kind==='loop'||s.group==='alive'){ loopSeg(s.name); setBadge(s.emotion,s.intensity); return; }
  _emoQ.push(s); if(!_emoDraining) _drainEmo(); }   // 큐잉: 진행 중이면 끝나고 이어서
function buildPerf(){ const g=$('segGrid'); if(!g||g.childElementCount)return; $('segCount').textContent='('+SEGS.length+')';
  const order={transition:0,loop:1}; const list=[...SEGS].sort((a,b)=>(order[a.kind]??2)-(order[b.kind]??2)||a.name.localeCompare(b.name));
  for(const s of list){ const c=document.createElement('div'); c.className='chip '+(s.group==='alive'?'alive':(s.kind==='loop'?'loop':''));
    c.innerHTML=`<span class="n">${esc(s.name)}</span><span class="m">${esc(s.emotion||s.group||'')} · ${esc(s.frames||'')}f</span>`;
    c.onclick=()=>previewSeg(s,c); g.appendChild(c); }
  const hints=['[happy] 좋아! [wink] 윙크','[concerned:0.8] 음… 이거 확인이 필요해','[surprise] 헐 [excited] 대박!','[skeptical] 진짜야? [smug] 거봐'];
  const h=$('perfHints'); hints.forEach(x=>{ const s=document.createElement('span'); s.textContent=x; s.onclick=()=>{$('perfIn').value=x;}; h.appendChild(s); }); }
function openPerf(){ buildPerf(); $('perf').classList.add('show'); setTimeout(()=>$('perfIn')?.focus(),150); }
function closePerf(){ $('perf').classList.remove('show'); }
// 감정 피커(#perf .box) 상단바 드래그로 이동 — 아바타 안 가리게 옆으로 치워두고 트리거/확인
(function(){ const box=$('perf')&&$('perf').querySelector('.box'), top=box&&box.querySelector('.top'); if(!top)return;
  let dx=0,dy=0,drag=false;
  top.addEventListener('mousedown',e=>{ if(e.target.classList.contains('x'))return;
    const r=box.getBoundingClientRect(); box.style.left=r.left+'px'; box.style.top=r.top+'px'; box.style.bottom='auto';
    dx=e.clientX-r.left; dy=e.clientY-r.top; drag=true; e.preventDefault(); });
  addEventListener('mousemove',e=>{ if(!drag)return;
    box.style.left=Math.max(0,Math.min(e.clientX-dx,innerWidth-60))+'px';
    box.style.top=Math.max(0,Math.min(e.clientY-dy,innerHeight-40))+'px'; });
  addEventListener('mouseup',()=>drag=false);
})();
async function runPerf(){ const t=$('perfIn').value.trim(); if(!t)return; closePerf();
  try{ await fetch(BRIDGE+'/hermes/out',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:t})}); }
  catch(e){ appendAgent(t('bridge_off_parse')); } }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePerf(); });
function renderSkills(filter){ const m=$('skillmenu'); const f=(filter||'').toLowerCase();
  const list=SKILLS.filter(s=>s.cmd.toLowerCase().startsWith(f));
  if(!list.length){ m.style.display='none'; return; }
  m.innerHTML=''; list.forEach(s=>{ const d=document.createElement('div');
    d.innerHTML=`<b>${esc(s.cmd)}</b>`+(s.desc?` <span class="cdesc">${esc(s.desc)}</span>`:'');
    d.onclick=()=>{ $('chatInput').value=s.cmd+' '; $('chatInput').focus(); m.style.display='none'; }; m.appendChild(d); });
  m.style.display='block'; m.scrollTop=0; }
function toggleSkills(){ const m=$('skillmenu'); if(m.style.display==='block'){ m.style.display='none'; return; } renderSkills(''); }
$('fileInput')?.addEventListener('change',e=>{ for(const f of e.target.files){ const n=document.createElement('div'); n.className='file'; n.innerHTML=`<span class="ic">📎</span><span class="fn">${esc(f.name)}</span><span style="margin-left:auto;color:var(--dim);font-size:11px">${(f.size/1024).toFixed(0)}KB</span>`; addRow('u',n); sendToBridge('[파일 첨부] '+f.name); } e.target.value=''; });

async function boot(){
  await loadPreset();                                    // 프리셋 먼저 (경로·이름·폰트·테마)
  try{ const m=await (await fetch(MANIFEST_URL,{cache:'no-store'})).json(); SEGS=m.segments; SEG_VER=m.version||'';
    for(const s of SEGS){ byName[s.name]=s;
      if(s.kind==='transition'){
        if(s.tier==='mood_variant'&&s.mood){ (byEmoMood[s.emotion]=byEmoMood[s.emotion]||{})[s.mood]=s; }
        else if(!byEmotion[s.emotion]) byEmotion[s.emotion]=s;
      }
      if(s.settle_times&&s.settle_times.length) settleT[s.name]=s.settle_times;
      else if(s.settle_frames&&s.settle_frames.length&&s.fps) settleT[s.name]=s.settle_frames.map(f=>f/s.fps); } }catch(e){}
  $('chatInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); sendChat(); }
    else if(e.key==='Escape'){ $('skillmenu').style.display='none'; } });
  // 텔레그램식 슬래시 자동완성: '/'로 시작하고 공백 전까지 입력하면 목록을 접두어로 필터해서 띄운다.
  $('chatInput').addEventListener('input',()=>{ const v=$('chatInput').value;
    if(v.startsWith('/') && !v.includes(' ')) renderSkills(v); else $('skillmenu').style.display='none'; });
  document.addEventListener('click',e=>{ if(!e.target.closest('.skillmenu')&&!e.target.closest('[onclick*=toggleSkills]')) $('skillmenu').style.display='none';
    if(!e.target.closest('.thememenu')&&!e.target.closest('#themeBtn')) $('thememenu').classList.remove('show'); });
  try{ curLang=localStorage.getItem('avatarLang')||'ko'; }catch(e){}
  if(PANE){ document.body.classList.add('pane','pane-'+PANE); initPaneWindow(); }   // 분리 창: 해당 패널만 채움 + 리사이즈 그립
  try{ applyTheme(localStorage.getItem('avatarTheme') || (PRESET&&PRESET.theme) || 'graphite'); }catch(e){ applyTheme('graphite'); }
  if(DO_CHAT){ if(!(await licenseGate())) return; }      // 첫 실행 키 게이트: chat/합본 창만(오픈엔진 통과). 상호작용이 chat에서 게이트되므로 video 창은 통과.
  try{ if(!PANE && localStorage.getItem('avatarNoChat')==='1') toggleChat(); }catch(e){}
  applyLang();
  loadName();
  try{ setMood(await (await fetch(BRIDGE+'/mood')).json()); }catch(e){}
  idle();
  loadCommands();                                        // 설치된 에이전트의 슬래시 명령 로드
  refreshTtsRuntime();                                   // 필러 ETA/준비상태 초기 로드
  try{ const es=new EventSource(BRIDGE+'/events');
    es.onopen=()=>{ esConnected=true; pollStatus(); };
    es.onmessage=(e)=>{ try{ play(JSON.parse(e.data)); }catch(_){ } };
    es.onerror=()=>{ esConnected=false; setLive('live_off'); if(stateKey==='online')_dotByAgent(); };
  }catch(_){}
  pollStatus();
}
boot();
</script>
